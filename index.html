<!doctype html>
<html lang="zh-CN">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>墨水屏日历</title>
	<link rel="shortcut icon" type="image/png" href="favicon.png">
	<link rel="stylesheet" href="css/main.css?v=2026072304">
</head>

<body>
	<nav class="global-nav" aria-label="全局导航">
		<div class="global-nav-inner">
			<a class="global-brand" href="#">EPD</a>
			<a href="#bluetooth-panel">蓝牙</a>
			<a href="#device-panel">模式</a>
			<a href="#slot-panel">图库</a>
			<a href="#image-panel">传图</a>
		</div>
	</nav>
	<div class="sub-nav-frosted">
		<div class="sub-nav-inner">
			<span id="driverMeta" class="sub-nav-meta">3.98寸（四色，SE0398NZ07-New-A1） · Web Bluetooth</span>
		</div>
	</div>
	<div class="main">
		<h3>墨水屏日历</h3>
		<fieldset id="bluetooth-panel">
			<legend>蓝牙连接</legend>
			<div class="flex-container">
				<div class="flex-group">
					<button id="connectbutton" type="button" class="primary" onclick="preConnect()">连接</button>
					<button id="reconnectbutton" type="button" class="secondary" onclick="reConnect()">重连</button>
					<button type="button" class="secondary" onclick="clearLog()">清空日志</button>
				</div>
				<div class="flex-group debug">
					<label for="epdpins">引脚</label>
					<input id="epdpins" type="text" value="">
					<button id="setDriverbutton" type="button" class="primary" onclick="setDriver()">确定</button>
					<label for="epddriver">驱动</label>
					<select id="epddriver" onchange="updateDitcherOptions()">
						<option value="01" data-color="blackWhiteColor" data-size="4.2_400_300">4.2寸 (黑白, UC8176)</option>
						<option value="03" data-color="threeColor" data-size="4.2_400_300">4.2寸 (三色, UC8176)</option>
						<option value="04" data-color="blackWhiteColor" data-size="4.2_400_300">4.2寸 (黑白, SSD1619)</option>
						<option value="02" data-color="threeColor" data-size="4.2_400_300">4.2寸 (三色, SSD1619)</option>
						<option value="05" data-color="fourColor" data-size="4.2_400_300">4.2寸 (四色, JCF)</option>
						<option value="16" data-color="fourColor" data-size="4.2_400_300">4.2寸 (四色, JD79668)</option>
						<option value="0d" data-color="fourColor" data-size="3.7_416_240">3.7BWRY (四色, GDEM037F51)</option>
						<option value="0e" data-color="threeColor" data-size="3.7_416_240">3.7BWR (三色, GDEY037Z03)</option>
						<option value="0f" data-color="threeColor" data-size="3.7_416_240">3.7BWR (三色, YS4370JS0C3)</option>
						<option value="12" data-color="threeColor" data-size="3.7_416_240">3.7BWR(三色，LG 3.7寸）</option>
						<option value="10" data-color="fourColor" data-size="3.98_768_552">3.98寸（四色，SE0398NZ07A0）</option>
						<option value="11" data-color="fourColor" data-size="3.98_768_552">3.98寸（四色，SE0398NZ07A1）</option>
						<option value="13" data-color="fourColor" data-size="3.98_768_552" selected>3.98寸（四色，SE0398NZ07-New-A1）</option>
						<option value="14" data-color="fourColor" data-size="3.87_800_480">3.87寸（四色，KEGM038701E01-J665）</option>
						<option value="15" data-color="fourColor" data-size="9.7_960_680">9.7寸（四色，GDEY133F91）</option>
						<option value="06" data-color="blackWhiteColor" data-size="7.5_800_480">7.5寸 (黑白, UC8179)</option>
						<option value="07" data-color="threeColor" data-size="7.5_800_480">7.5寸 (三色, UC8179)</option>
						<option value="0c" data-color="fourColor" data-size="7.5_800_480">7.5寸 (四色, JD79668)</option>
						<option value="08" data-color="blackWhiteColor" data-size="7.5_640_384">7.5寸低分 (黑白, UC8159)</option>
						<option value="09" data-color="threeColor" data-size="7.5_640_384">7.5寸低分 (三色, UC8159)</option>
						<option value="0a" data-color="blackWhiteColor" data-size="7.5_880_528">7.5寸HD (黑白, SSD1677)</option>
						<option value="0b" data-color="threeColor" data-size="7.5_880_528">7.5寸HD (三色, SSD1677)</option>
					</select>
				</div>
			</div>
			<div class="log-container" id="log"></div>
		</fieldset>
		<fieldset id="device-panel">
			<legend>模式切换</legend>
			<div class="flex-container">
				<div class="flex-group">
					<label for="weekStart">星期第一天:</label>
					<select id="weekStart">
						<option value="1" selected>周一</option>
						<option value="2">周二</option>
						<option value="3">周三</option>
						<option value="4">周四</option>
						<option value="5">周五</option>
						<option value="6">周六</option>
						<option value="0">周日</option>
					</select>
					<button id="calendarmodebutton" type="button" class="primary" onclick="syncTime(1)">日历模式</button>
					<button id="clockmodebutton" type="button" class="primary" onclick="syncTime(2)">时钟模式</button>
					<button id="clearscreenbutton" type="button" class="secondary" onclick="clearScreen()">清除屏幕</button>
				</div>
				<div class="flex-group right debug">
					<input type="text" id="cmdTXT" value="">
					<button id="sendcmdbutton" type="button" class="primary" onclick="sendcmd()">发送命令</button>
				</div>
			</div>
		</fieldset>
		<fieldset id="slot-panel">
			<legend>图片槽位</legend>
			<div class="slot-toolbar">
				<div>
					<strong id="slotSummary">连接设备后读取槽位</strong>
					<span id="slotHint" class="slot-hint">图片保存在设备外置 Flash 中</span>
				</div>
				<div class="slot-toolbar-actions">
					<button id="refreshSlotsButton" type="button" class="secondary" onclick="refreshSlots()" disabled>刷新槽位</button>
					<button id="eraseAllSlotsButton" type="button" class="secondary slot-delete" onclick="freeAllImageSlots()" disabled>擦除全部</button>
				</div>
			</div>
			<div class="slot-slide-controls">
				<label for="slotSlideMinutes">轮播间隔</label>
				<input id="slotSlideMinutes" type="number" min="1" max="65535" value="5" inputmode="numeric">
				<span>分钟</span>
				<button id="startSlotSlideButton" type="button" class="primary" onclick="startSlotSlide()" disabled>启动轮播</button>
				<button id="randomSlotSlideButton" type="button" class="secondary" onclick="startRandomSlotSlide()" disabled>随机轮播</button>
				<button id="stopSlotSlideButton" type="button" class="secondary" onclick="stopSlotSlide()" disabled>停止</button>
			</div>
			<div id="slotGrid" class="slot-grid" aria-live="polite"></div>
			<div id="slotReadStatus" class="slot-read-status" hidden></div>
		</fieldset>
		<fieldset id="image-panel">
			<legend>蓝牙传图</legend>
			<div id="imageDropZone" class="flex-container file-picker-row" title="可选择图片，也可将图片拖放到这里">
				<label for="imageFile" class="file-picker-title">图片文件:</label>
				<input type="file" id="imageFile" accept=".png,.jpg,.bmp,.webp,.jpeg" onchange="updateImage()">
			</div>
			<div class="flex-container options">
				<div class="flex-group debug">
					<label for="canvasSize">画布尺寸:</label>
					<select id="canvasSize" onchange="updateCanvasSize()">
						<option value="1.54_152_152">1.54 (152x152)</option>
						<option value="1.54_200_200">1.54 (200x200)</option>
						<option value="2.13_212_104">2.13 (212x104)</option>
						<option value="2.13_250_122">2.13 (250x122)</option>
						<option value="2.66_296_152">2.66 (296x152)</option>
						<option value="2.9_296_128">2.9 (296x128)</option>
						<option value="2.9_384_168">2.9 (384x168)</option>
						<option value="3.5_384_184">3.5 (384x184)</option>
						<option value="3.7_416_240">3.7 (416x240)</option>
						<option value="3.97_800_480">3.97 (800x480)</option>
						<option value="3.98_768_552" selected>3.98 (768x552)</option>
						<option value="3.98_800_600">3.98 (800x600)</option>
						<option value="3.87_800_480">3.87 (800x480)</option>
						<option value="9.7_960_680">9.7 (960x680)</option>
						<option value="4.2_400_300">4.2 (400x300)</option>
						<option value="5.79_792_272">5.79 (792x272)</option>
						<option value="5.83_600_448">5.83 (600x448)</option>
						<option value="5.83_648_480">5.83 (648x480)</option>
						<option value="7.5_640_384">7.5 (640x384)</option>
						<option value="7.5_800_480">7.5 (800x480)</option>
						<option value="7.5_880_528">7.5 (880x528)</option>
						<option value="10.2_960_640">10.2 (960x640)</option>
						<option value="10.85_1360_480">10.85 (1360x480)</option>
						<option value="11.6_960_640">11.6 (960x640)</option>
						<option value="4E_600_400">4E (600x400)</option>
						<option value="7.3E6">7.3E6 (480x800)</option>
					</select>
				</div>
				<div class="flex-group debug">
					<label for="ditherMode">颜色模式:</label>
					<select id="ditherMode" onchange="applyDither()">
						<option value="blackWhiteColor">双色(黑白)</option>
						<option value="threeColor">三色(黑白红)</option>
						<option value="fourColor" selected>四色(黑白红黄)</option>
						<option value="sixColor">六色(黑白红黄蓝绿)</option>
					</select>
				</div>
				<div class="flex-group">
					<label for="ditherAlg">抖动算法:</label>
					<select id="ditherAlg" onchange="applyDither()">
						<option value="floydSteinberg">Floyd-Steinberg</option>
						<option value="atkinson">Atkinson</option>
						<option value="bayer">Bayer</option>
						<option value="stucki">Stucki</option>
						<option value="jarvis">Jarvis-Judice-Ninke</option>
						<option value="none">无抖动</option>
					</select>
					<button id="resetDitherAdjustments" type="button" class="secondary">还原默认</button>
				</div>
			</div>
			<div class="flex-container options dither-adjust-row">
				<div class="flex-group">
					<label for="ditherStrength">抖动强度:</label>
					<input type="range" min="0" max="5" step="0.1" value="1.0" id="ditherStrength">
					<label id="ditherStrengthValue">1.0</label>
				</div>
				<div class="flex-group">
					<label for="ditherContrast">对比度:</label>
					<input type="range" min="0.5" max="2" step="0.1" value="1.2" id="ditherContrast">
					<label id="ditherContrastValue">1.2</label>
				</div>
				<div class="flex-group">
					<label for="ditherBrightness">亮度:</label>
					<input type="range" min="-80" max="80" step="1" value="0" id="ditherBrightness">
					<label id="ditherBrightnessValue">0</label>
				</div>
				<div class="flex-group">
					<label for="ditherSaturation">饱和度:</label>
					<input type="range" min="0" max="2.5" step="0.1" value="1.2" id="ditherSaturation">
					<label id="ditherSaturationValue">1.2</label>
				</div>
			</div>
			<div class="flex-container options">
				<div class="flex-group debug">
					<label for="mtusize">MTU:</label>
					<input type="number" id="mtusize" value="20" min="0" max="255">
					<label for="interleavedcount">确认间隔:</label>
					<input type="number" id="interleavedcount" value="50" min="0" max="500">
				</div>
			</div>
			<div class="status-bar"><b>状态：</b><span id="status"></span></div>
			<div class="flex-container image-actions-row">
				<div class="flex-group image-send-actions" role="group" aria-label="发送和图片方向操作">
					<button type="button" class="secondary debug" onclick="downloadDataArray()">下载数组</button>
					<button id="sendimgbutton" type="button" class="primary" onclick="sendimg()">发送图片</button>
					<button id="rotate-left" type="button" title="向左旋转" aria-label="向左旋转" class="tool-button">↺</button>
					<button id="rotate-right" type="button" title="向右旋转" aria-label="向右旋转" class="tool-button">↻</button>
					<button id="reset-transform" type="button" title="重置图片位置、缩放和旋转" aria-label="重置图片变换" class="tool-button">⟲</button>
					<button id="clear-canvas" type="button" title="清除当前图片和画布" aria-label="清除画布" class="tool-button">⌫</button>
				</div>
			</div>
			<div class="canvas-container">
				<div class="canvas-title"></div>
				<canvas id="canvas" width="768" height="552"></canvas>
				<div class="flex-container canvas-tools">
					<div class="flex-group tool-buttons">
						<button id="brush-mode" title="画笔" class="tool-button">✏️</button>
						<button id="eraser-mode" title="橡皮擦" class="tool-button">🧽</button>
						<button id="text-mode" title="添加文字" class="tool-button">T</button>
						<button id="todo-mode" title="待办事项" class="tool-button">☐</button>
						<button id="schedule-mode" title="课表" class="tool-button">📅</button>
						<button id="matter-mode" title="事项模板" class="tool-button">事</button>
						<button id="undo-btn" title="撤销 (Ctrl+Z)" class="tool-button hide">↶</button>
						<button id="redo-btn" title="重做 (Ctrl+Y)" class="tool-button hide">↷</button>
					</div>
				</div>
				<div class="flex-container canvas-tools">
					<div class="flex-group brush-tools">
						<label for="brush-color">颜色:</label>
						<select id="brush-color">
							<option value="#000000">黑色</option>
							<option value="#FF0000">红色</option>
							<option value="#FFFF00">黄色</option>
							<option value="#00FF00">绿色</option>
							<option value="#0000FF">蓝色</option>
							<option value="#FFFFFF">白色</option>
						</select>
						<span class="brush-size-controls">
							<label for="brush-size">粗细:</label>
							<input type="number" id="brush-size" value="2" min="1" max="100">
							<input type="range" id="brush-size-range" value="2" min="1" max="100">
						</span>
					</div>
				</div>
				<div class="flex-container canvas-tools">
					<div class="flex-group text-tools shared-font-tools">
						<label for="font-family">字体:</label>
						<select id="font-family">
							<option value="Arial">Arial</option>
							<option value="sans-serif">Sans-serif</option>
							<option value="monospace">Monospace</option>
							<option value="SimSun">宋体</option>
							<option value="SimHei">黑体</option>
							<option value="Microsoft Yahei">微软雅黑</option>
							<option value="Microsoft JhengHei">微软正黑体</option>
							<option value="KaiTi">楷体</option>
							<option value="NSimSun">新宋体</option>
							<option value="FangSong">仿宋</option>
							<option value="YouYuan">幼圆</option>
							<option value="LiSu">隶书</option>
							<option value="STHeiti">华文黑体</option>
							<option value="STXihei">华文细黑</option>
							<option value="STKaiti">华文楷体</option>
							<option value="STSong">华文宋体</option>
							<option value="STFangsong">华文仿宋</option>
							<option value="STZhongsong">华文中宋</option>
							<option value="STHupo">华文琥珀</option>
							<option value="STXinwei">华文新魏</option>
							<option value="STLiti">华文隶书</option>
							<option value="STXingkai">华文行楷</option>
							<option value="FZShuTi">方正舒体</option>
							<option value="FZYaoti">方正姚体</option>
							<option value="PingFang SC">苹方</option>
							<option value="Source Han Sans CN">思源黑体</option>
							<option value="Source Han Serif SC">思源宋体</option>
							<option value="WenQuanYi Micro Hei">文泉驿微米黑</option>
							</optgroup>
						</select>
						<span class="text-size-controls">
							<label for="font-size">大小:</label>
							<input type="number" id="font-size" value="16" min="1" max="100">
							<input type="range" id="font-size-range" value="16" min="1" max="100">
						</span>
					</div>
					<div class="flex-group text-tools">
						<input type="text" id="text-input" placeholder="输入文字" style="width:150px">
						<button id="text-bold" title="粗体">B</button>
						<button id="text-italic" title="斜体">I</button>
						<button id="add-text-btn" class="primary">添加文字</button>
					</div>
					<div class="flex-group todo-tools">
						<label for="todo-font-size">大小:</label>
						<input type="number" id="todo-font-size" value="16" min="8" max="100">
						<input type="range" id="todo-font-size-range" value="16" min="8" max="100">
					</div>
					<div class="flex-group todo-tools">
						<input type="text" id="todo-input" placeholder="输入待办事项" style="width:170px">
						<select id="todo-color">
							<option value="#000000">黑色</option>
							<option value="#FF0000">红色</option>
							<option value="#FFFF00">黄色</option>
							<option value="#00FF00">绿色</option>
							<option value="#0000FF">蓝色</option>
						</select>
						<button id="todo-bold" title="粗体">B</button>
						<button id="todo-italic" title="斜体">I</button>
						<button id="toggle-todo-delete-btn" title="显示/隐藏删除按钮" class="primary">删除键</button>
						<button id="add-todo-btn" class="primary">添加待办</button>
					</div>
					<div class="flex-group schedule-tools">
						<label for="schedule-days">天数:</label>
						<input type="number" id="schedule-days" value="5" min="1" max="7">
						<label for="schedule-classes">节数:</label>
						<input type="number" id="schedule-classes" value="6" min="1" max="12">
						<label for="schedule-font-size">字号:</label>
						<input type="number" id="schedule-font-size" value="12" min="6" max="32">
						<button id="schedule-font-decrease-btn" title="减小字号">-</button>
						<button id="schedule-font-increase-btn" title="增大字号">+</button>
						<select id="schedule-color">
							<option value="#000000">黑色</option>
							<option value="#FF0000">红色</option>
							<option value="#FFFF00">黄色</option>
							<option value="#0000FF">蓝色</option>
						</select>
						<button id="toggle-schedule-cell-indicator-btn" title="显示/隐藏选中标记" class="primary">标记</button>
						<button id="create-schedule-btn" class="primary">生成课表</button>
					</div>
					<div class="flex-group schedule-tools">
						<button id="schedule-zoom-in-btn" title="放大">+</button>
						<button id="schedule-zoom-out-btn" title="缩小">-</button>
						<button id="schedule-move-left-btn" title="左移">⇦</button>
						<button id="schedule-move-up-btn" title="上移">⇧</button>
						<button id="schedule-move-down-btn" title="下移">⇩</button>
						<button id="schedule-move-right-btn" title="右移">⇨</button>
					</div>
					<div class="flex-group schedule-tools schedule-input-tools">
						<textarea id="schedule-input" placeholder="输入课程，支持换行" rows="2" style="width:220px"></textarea>
						<button id="schedule-input-confirm-btn" class="primary">确定</button>
						<button id="schedule-input-cancel-btn" class="secondary">取消</button>
					</div>
					<div class="flex-group matter-tools matter-actions">
						<button id="matter-render-btn" class="primary">生成事项</button>
						<button id="matter-add-limit-btn">添加限时</button>
						<button id="matter-add-todo-btn">添加待办</button>
						<button id="matter-add-schedule-btn">添加日程</button>
						<button id="matter-clear-btn" class="secondary">清空事项</button>
					</div>
					<div class="matter-tools matter-editor">
						<div class="matter-section">
							<div class="matter-section-title">限时事项</div>
							<table id="matter-limit-table">
								<thead>
									<tr><th>名称</th><th>提醒</th><th>截止</th><th></th></tr>
								</thead>
								<tbody></tbody>
							</table>
						</div>
						<div class="matter-section">
							<div class="matter-section-title">待办事项</div>
							<table id="matter-todo-table">
								<thead>
									<tr><th>事项</th><th>级别</th><th></th></tr>
								</thead>
								<tbody></tbody>
							</table>
						</div>
						<div class="matter-section">
							<div class="matter-section-title">今日日程</div>
							<table id="matter-schedule-table">
								<thead>
									<tr><th>分类</th><th>内容</th><th></th></tr>
								</thead>
								<tbody></tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</fieldset>
		<div class="footer">
			<span class="background-settings">
				<button id="toggleBackgroundControls" type="button" class="secondary background-toggle" aria-expanded="false" aria-controls="backgroundControls">网页背景</button>
				<span id="backgroundControls" class="background-controls" hidden>
					<span class="background-file-group">
						<span class="background-file-row">
							<input type="file" id="pageBackgroundFile" accept=".png,.jpg,.jpeg,.webp,.bmp">
						</span>
						<button id="openBackgroundSettings" type="button" class="secondary">背景设置</button>
					</span>
					<span class="background-slider-group">
						<span class="background-slider-row">
							<label for="uiOpacityRange">UI透明度:</label>
							<input type="range" id="uiOpacityRange" min="0" max="1" step="0.01" value="0.88">
							<span id="uiOpacityValue" class="opacity-value">88%</span>
						</span>
						<span class="background-slider-row">
							<label for="glassClarityRange">背景清晰度:</label>
							<input type="range" id="glassClarityRange" min="0" max="1" step="0.01" value="0">
							<span id="glassClarityValue" class="opacity-value">0%</span>
						</span>
					</span>
					<span class="background-button-group">
						<button id="clearPageBackground" type="button" class="secondary">清除背景</button>
						<button id="resetBackgroundDefaults" type="button" class="secondary">恢复默认</button>
					</span>
				</span>
			</span>
			<span class="links">
				<a href="https://github.com/tsl0922/EPD-nRF5">Github</a>
				<a href="https://qm.qq.com/q/SckzhfDxuu" onclick="return confirm('本群是此开源固件作者的技术交流群\n如果你购买了成品，请找卖家提供售后！')">交流群</a>
				<a href="?debug=true" id="debug-toggle">开发模式</a>
			</span>
			<span class="copy">&copy;Source from tsl0922, modify by JCF 2026 | 更新时间: 2026-07-08</span>
		</div>

	<div id="backgroundSettingsModal" class="modal-overlay" hidden>
		<div class="background-modal" role="dialog" aria-modal="true" aria-labelledby="backgroundSettingsTitle">
			<div class="modal-header">
				<h4 id="backgroundSettingsTitle">背景设置</h4>
				<button id="closeBackgroundSettings" type="button" class="icon-button" aria-label="关闭">×</button>
			</div>
			<div class="background-preview" aria-label="背景预览">
				<div class="background-preview-image"></div>
				<div class="background-preview-mask"></div>
			</div>
			<div class="background-fit-options" aria-label="背景裁切方式">
				<button type="button" class="tool-button" data-bg-fit="cover">填充裁切</button>
				<button type="button" class="tool-button active" data-bg-fit="contain">完整显示</button>
				<button type="button" class="tool-button" data-bg-fit="100% 100%">拉伸铺满</button>
				<button type="button" class="tool-button" data-bg-toggle="flipX">水平翻转</button>
				<button type="button" class="tool-button" data-bg-toggle="flipY">垂直翻转</button>
			</div>
			<div class="background-edit-grid">
				<label for="bgZoomRange">缩放</label>
				<input type="range" id="bgZoomRange" min="0.5" max="3" step="0.01" value="1">
				<span id="bgZoomValue" class="opacity-value">100%</span>

				<label for="bgOffsetXRange">横向移动</label>
				<input type="range" id="bgOffsetXRange" min="-40" max="40" step="1" value="0">
				<span id="bgOffsetXValue" class="opacity-value">0%</span>

				<label for="bgOffsetYRange">纵向移动</label>
				<input type="range" id="bgOffsetYRange" min="-40" max="40" step="1" value="0">
				<span id="bgOffsetYValue" class="opacity-value">0%</span>

				<label for="bgRotateRange">旋转</label>
				<input type="range" id="bgRotateRange" min="-180" max="180" step="1" value="0">
				<span id="bgRotateValue" class="opacity-value">0°</span>

				<label for="bgBrightnessRange">亮度</label>
				<input type="range" id="bgBrightnessRange" min="0.4" max="1.6" step="0.01" value="1">
				<span id="bgBrightnessValue" class="opacity-value">100%</span>

				<label for="bgContrastRange">对比度</label>
				<input type="range" id="bgContrastRange" min="0.5" max="1.8" step="0.01" value="1">
				<span id="bgContrastValue" class="opacity-value">100%</span>

				<label for="bgSaturationRange">饱和度</label>
				<input type="range" id="bgSaturationRange" min="0" max="2" step="0.01" value="1">
				<span id="bgSaturationValue" class="opacity-value">100%</span>

				<label for="bgMaskRange">背景遮罩</label>
				<input type="range" id="bgMaskRange" min="0" max="0.7" step="0.01" value="0.22">
				<span id="bgMaskValue" class="opacity-value">22%</span>
			</div>
			<div class="modal-actions">
				<button id="resetBackgroundAdjustments" type="button" class="secondary">重置调节</button>
				<button id="doneBackgroundSettings" type="button" class="primary">完成</button>
			</div>
		</div>
	</div>
